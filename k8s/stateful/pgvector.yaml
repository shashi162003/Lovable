apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
  namespace: lovable-app
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<EOSQL
      CREATE DATABASE "accountDB";
      CREATE DATABASE "workspaceDB";
      CREATE DATABASE "intelligenceDB";

      CREATE USER account_user WITH PASSWORD '${ACCOUNT_DB_PASSWORD}';
      CREATE USER workspace_user WITH PASSWORD '${WORKSPACE_DB_PASSWORD}';
      CREATE USER intelligence_user WITH PASSWORD '${INTELLIGENCE_DB_PASSWORD}';

      GRANT ALL PRIVILEGES ON DATABASE "accountDB" TO account_user;
      GRANT ALL PRIVILEGES ON DATABASE "workspaceDB" TO workspace_user;
      GRANT ALL PRIVILEGES ON DATABASE "intelligenceDB" TO intelligence_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "accountDB" <<EOSQL
      GRANT ALL ON SCHEMA public TO account_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "workspaceDB" <<EOSQL
      GRANT ALL ON SCHEMA public TO workspace_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "intelligenceDB" <<EOSQL
      GRANT ALL ON SCHEMA public TO intelligence_user;
    EOSQL

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: lovable-app
spec:
  selector:
    matchLabels:
      app: pgvector
  serviceName: pgvector
  replicas: 1
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: ACCOUNT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ACCOUNT_DB_PASSWORD
            - name: WORKSPACE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WORKSPACE_DB_PASSWORD
            - name: INTELLIGENCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTELLIGENCE_DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: pgvector-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: lovable-app
spec:
  clusterIP: None
  selector:
    app: pgvector
  ports:
    - port: 5432