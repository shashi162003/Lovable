apiVersion: v1
kind: Namespace
metadata:
  name: lovable-app

---
# to create a separate ns for previews

apiVersion: v1
kind: Namespace
metadata:
  name: lovable-previews

---
# configmap for shared config values across services

apiVersion: v1
kind: ConfigMap
metadata:
  name: lovable-shared-config
  namespace: lovable-core
data:
  PREVIEW_DOMAIN: "previews.devshashi.live"
  PREVIEW_NAMESPACE: "lovable-previews"
  PROXY_PORT: "80"
  APP_FRONTEND_URL: "http://devshashi.live"
