apiVersion: v1
kind: Namespace
metadata:
  name: lovable-app

---

apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: lovable-app
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-server
  namespace: lovable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            memory: "128Mi"
            cpu: "250m"

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
  type: ClusterIP
