apiVersion: apps/v1
kind: Deployment
metadata:
  name: lovable-proxy
  namespace: lovable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lovable-proxy
  template:
    metadata:
      labels:
        app: lovable-proxy
    spec:
      containers:
      - name: proxy
        image: lovable-proxy:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
          - name: REDIS_URL
            value: "redis://redis-service:6379"
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: lovable-proxy-svc
  namespace: lovable-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: lovable-proxy