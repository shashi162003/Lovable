apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: isolate-project-pods
  namespace: lovable-app
spec:
  podSelector:
    matchLabels:
      status: busy
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lovable-proxy
      ports:
        - protocol: TCP
          port: 5173

  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0